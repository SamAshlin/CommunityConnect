<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Donor Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL ===== */
body{
  overflow:hidden;
  margin:0;
  font-family:'Inter',sans-serif;
  background: linear-gradient(
    270deg,
    #020617,
    #0f172a,
    #020617
  );
  background-size:400% 400%;
  animation: bgMove 15s ease infinite;
  color:#e2e8f0;
  height:100vh;
}

/* ===== CARD ===== */
.container{
  width:360px;
  padding:30px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  text-align:center;
  margin-top:40px;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
}

/* ===== TITLE ===== */
h2{
  margin-bottom:20px;
  display:inline-block;

  background: linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===== INPUT ===== */
input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:white;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(99,102,241,0.4);
}

/* ===== LINKS ===== */
.link{
  margin-top:12px;
  color:#a5b4fc;
  cursor:pointer;
  display:block;
}

/* ===== SPINNER ===== */
.loading-btn{
  pointer-events:none;
  opacity:0.8;
}

.spinner{
  width:18px;
  height:18px;
  border:3px solid rgba(255,255,255,0.3);
  border-top:3px solid white;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:auto;
}

@keyframes spin{
  to{transform:rotate(360deg);}
}

/* ===== MODAL ===== */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
}

.modal-box{
  width:320px;
  padding:25px;
  border-radius:15px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  text-align:center;
}

.hidden{
  display:none;
}

/* SUCCESS OVERLAY */
.success-overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.success-box{
  text-align:center;
  animation:scaleIn 0.4s ease;
}

.checkmark{
  width:80px;
  height:80px;
  border-radius:50%;
  border:3px solid #22c55e;
  position:relative;
  margin:auto;
}

.checkmark::after{
  content:"";
  position:absolute;
  left:22px;
  top:40px;
  width:20px;
  height:10px;
  border-left:3px solid #22c55e;
  border-bottom:3px solid #22c55e;
  transform:rotate(-45deg);
  animation:tick 0.4s ease forwards;
}

@keyframes tick{
  from{opacity:0; transform:scale(0.5) rotate(-45deg);}
  to{opacity:1; transform:scale(1) rotate(-45deg);}
}

@keyframes scaleIn{
  from{transform:scale(0.8); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  padding:6px 12px;
  font-size:13px;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  color:#cbd5f5;
  z-index:10;
  display:inline-block; /* IMPORTANT */
  width:auto !important; /* override global button width */
}

.back-btn:hover{
  background:#6366f1;
  color:white;
  box-shadow:0 5px 15px rgba(99,102,241,0.4);
}

.brand{
  position:fixed;
  top:50px;
  left:50%;
  transform:translateX(-50%);
  z-index:100; /* IMPORTANT */
  font-size:20px;
  font-weight:600;
  background:linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}

.brand::after{
  content:"";
  display:block;
  width:40px;
  height:3px;
  margin:6px auto;
  background:linear-gradient(90deg,#6366f1,#8b5cf6);
  border-radius:10px;
}

.welcome-msg{
  font-size:14px;
  color:#94a3b8;
  margin-bottom:15px;
}

.welcome-msg span{
  font-size:12px;
  color:#64748b;
}

.org-link{
  margin-top:25px;
  font-size:13px;
  color:#94a3b8;
}

.org-link a{
  color:#a78bfa;
  text-decoration:none;
  font-weight:500;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

</style>
</head>

<body>
<button class="back-btn" onclick="goBack()">← Back</button>

<div class="brand">
  Community Connect
</div>

<div class="container">

<p class="welcome-msg">
  Welcome back 👋<br>
  <span>Continue making impact today</span>
</p>

<h2>Donor Login</h2>

<input id="mobile" placeholder="Mobile Number">
<input type="password" id="password" placeholder="Password">

<button id="loginBtn" onclick="loginUser()">Login</button>

<span class="link" onclick="openForgot()">Forgot Password?</span>

<p class="org-link">
  Are You An Organization? 
  <a href="/org-login">Login here</a>
</p>

</div>

<!-- FORGOT PASSWORD MODAL -->
<div id="forgotModal" class="modal hidden">
  <div class="modal-box">

    <h3>Reset Password</h3>

    <input id="fp_mobile" placeholder="Mobile Number">

    <button onclick="sendOTP()">Send OTP</button>

    <div id="otpSection" class="hidden">
      <input id="otp" placeholder="Enter OTP">
      <input type="password" id="new_pass" placeholder="New Password">

      <button onclick="verifyOTP()">Verify & Update</button>
    </div>

    <button onclick="closeForgot()">Cancel</button>

  </div>
</div>

<script>

/* LOGIN WITH SPINNER */
async function loginUser(){

const btn = document.getElementById("loginBtn");

btn.classList.add("loading-btn");
btn.innerHTML = `<div class="spinner"></div>`;

const mobile = document.getElementById("mobile").value;
const password = document.getElementById("password").value;

try{

const response = await fetch("/login-user", {
method: "POST",
headers: { "Content-Type": "application/json" },
body: JSON.stringify({ mobile, password })
});

const result = await response.json();

if(response.status === 200){

localStorage.setItem("token", result.token);
localStorage.setItem("role", result.role);

/* SHOW SUCCESS ANIMATION */
document.body.insertAdjacentHTML("beforeend",`
<div class="success-overlay">
  <div class="success-box">
    <div class="checkmark"></div>
    <p style="margin-top:15px;">Login Successful</p>
  </div>
</div>
`);

setTimeout(()=>{
  window.location.href="/user-dashboard";
},1500);

}

}catch(err){
alert("Login failed");
resetBtn();
}

function resetBtn(){
btn.classList.remove("loading-btn");
btn.innerText = "Login";
}

}

/* FORGOT PASSWORD UI */
function openForgot(){
document.getElementById("forgotModal").classList.remove("hidden");
}

function closeForgot(){
document.getElementById("forgotModal").classList.add("hidden");
}

/* RESET PASSWORD (Frontend only for now) */
async function resetPassword(){

const mobile = document.getElementById("fp_mobile").value;
const newPass = document.getElementById("new_pass").value;

if(!mobile || !newPass){
alert("Fill all fields");
return;
}

/* 🔥 YOU NEED BACKEND API FOR THIS */
await fetch("/reset-password",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
mobile: mobile,
newPassword: newPass
})
});

alert("Password updated");
closeForgot();

}

async function sendOTP(){

const mobile = document.getElementById("fp_mobile").value;

if(!mobile){
  alert("Enter mobile");
  return;
}

await fetch("/send-otp",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({ mobile })
});

alert("OTP sent (check console for now)");

document.getElementById("otpSection").classList.remove("hidden");
}

async function verifyOTP(){

const mobile = document.getElementById("fp_mobile").value;
const otp = document.getElementById("otp").value;
const newPass = document.getElementById("new_pass").value;

const res = await fetch("/verify-otp",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify({
mobile,
otp,
newPassword: newPass
})
});

const result = await res.json();

alert(result.msg);

if(res.status === 200){
closeForgot();
}
}

function goBack(){
  window.location.href="/";
}

</script>

</body>
</html>
