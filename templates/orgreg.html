<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Organization Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

/* MOVING GRADIENT BACKGROUND */
body{
  margin:0;
  font-family:'Inter',sans-serif;

  background: linear-gradient(
    270deg,
    #eef2ff,
    #f8fafc,
    #e0e7ff,
    #f0f9ff
  );

  background-size: 400% 400%;
  animation: gradientMove 12s ease infinite;

  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* ANIMATION */
@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

/* BIG CARD */
.container{
  width:700px;
  padding:35px;
  border-radius:18px;
  background:white;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:20px;
  display:inline-block;

  background: linear-gradient(90deg,#6366f1,#8b5cf6);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* SECTIONS */
.section-title{
  margin-top:20px;
  font-weight:600;
  color:#6366f1;
}

/* INPUT */
input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:1px solid #e5e7eb;
}

textarea{height:80px;}

/* BUTTON */
button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  font-weight:600;
  cursor:pointer;
}

/* SPINNER */
.loading-btn{pointer-events:none;}
.spinner{
  width:18px;height:18px;
  border:3px solid #ccc;
  border-top:3px solid #6366f1;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:auto;
}

@keyframes spin{to{transform:rotate(360deg);}}

</style>
</head>

<body>

<div class="container">

<h2>Organization Registration</h2>

<div class="section-title">Basic Details</div>
<input id="orgName" placeholder="Organization Name">
<input id="registrationNumber" placeholder="Registration Number">

<select id="ngoType">
<option value="">NGO Type</option>
<option>Education</option>
<option>Healthcare</option>
<option>Environment</option>
</select>

<textarea id="description" placeholder="Description"></textarea>

<div class="section-title">Contact</div>
<input id="contactPerson" placeholder="Contact Person">
<input id="email" placeholder="Email">
<input id="mobile" placeholder="Mobile">
<input id="address" placeholder="Address">

<div class="section-title">Bank</div>
<input id="bankAccount" placeholder="Account">
<input id="ifsc" placeholder="IFSC">
<input id="upi" placeholder="UPI">

<div class="section-title">Security</div>
<input type="password" id="password" placeholder="Password">

<button id="orgBtn" onclick="registerOrg()">Register</button>

</div>

<script>

async function registerOrg(){

const btn = document.getElementById("orgBtn");
btn.classList.add("loading-btn");
btn.innerHTML = `<div class="spinner"></div>`;

const data = {
orgName: orgName.value,
registrationNumber: registrationNumber.value,
ngoType: ngoType.value,
description: description.value,
contactPerson: contactPerson.value,
email: email.value,
mobile: mobile.value,
address: address.value,
bankAccount: bankAccount.value,
ifsc: ifsc.value,
upi: upi.value,
password: password.value
};

const res = await fetch("/register-org",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body: JSON.stringify(data)
});

const result = await res.json();

btn.classList.remove("loading-btn");
btn.innerText = "Register";

alert(result.msg);

}

</script>

</body>
</html>
