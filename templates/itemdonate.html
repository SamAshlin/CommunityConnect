<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Donate Items</title>

<style>

/* ===== GLOBAL ===== */
body{
margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#e2e8f0;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.top-header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:85px; /* 🔥 increased */
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 60px; /* 🔥 more breathing space */
  background:rgba(15,23,42,0.9);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  z-index:100;
}

.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.header-right{
  display:flex;
  align-items:center;
  padding-right:10px;
}

.top-header h1{
  margin:0;
  font-size:22px;
  font-weight:600;
  display:inline-block;

  background: linear-gradient(90deg,#a78bfa,#60a5fa);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* BACK BUTTON */
.back-btn{
  padding:8px 16px;
  border-radius:25px;
  border:none;
  background:rgba(255,255,255,0.08);
  color:#cbd5f5;
  cursor:pointer;
  font-size:14px;
  transition:0.3s;
  margin-right: 75px;
  margin-bottom: 22px;
}

.back-btn:hover{
  background:#6366f1;
  color:white;
}

/* DOT ANIMATION */
.dots span{
  width:6px;
  height:6px;
  background:#6366f1;
  border-radius:50%;
  display:inline-block;
  margin-left:4px;
  animation:bounce 1s infinite;
}

.dots span:nth-child(2){ animation-delay:0.2s; }
.dots span:nth-child(3){ animation-delay:0.4s; }

@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

.page{
  display:flex;
  gap:80px;
  justify-content:center;
  align-items:center; /* 🔥 THIS FIXES VERTICAL CENTER */
  min-height:calc(100vh - 85px); /* full height minus header */
  padding-top:75px;
}

/* ===== MAIN CARD ===== */
.container{
  width:380px;
  padding:35px; /* increased */
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  animation:fadeUp 0.5s ease;
}

.side-container{
  width:320px;
  padding:30px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  animation:fadeUp 0.5s ease;
}

.container, .side-container{
  position:relative;
  z-index:2;
}

/* ===== TITLE ===== */
h2{
  margin-top:0;
  font-size:22px;
  font-weight: 600;
  background: linear-gradient(90deg, #a78bfa, #60a5fa);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===== INFO TEXT ===== */
.info{
  color:#94a3b8;
  font-size:14px;
  margin:8px 0;
}

/* ===== INPUTS ===== */
input, select{
  width:100%;
  padding:12px;
  margin-top:14px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:white;
}

input::placeholder{
  color:#94a3b8;
}

/* ===== RADIO ===== */
.radio-group{
  display:flex;
  gap:15px;
  margin-top:18px;
}

.radio-group label{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  padding:8px 12px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  transition:0.3s;
}

.radio-group label:hover{
  background:rgba(255,255,255,0.1);
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:14px;
  margin-top:22px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(99,102,241,0.4);
}

/* ===== SUCCESS ===== */
.success{
  color:#22c55e;
  margin-top:15px;
  font-weight:500;
}

/* ===== HIDDEN ===== */
.hidden{
  display:none;
}

/* ===== ANIMATION ===== */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOADING BUTTON */
.loading-btn {
  position: relative;
  pointer-events: none;
  opacity: 0.8;
}

/* SPINNER */
.spinner {
  width: 18px;
  height: 18px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top: 3px solid white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: auto;
}

.footer-text{
  position:fixed;
  bottom:20px; 
  width:100%;
  text-align:center;
  font-size:14px;
  color:#94a3b8;
}

/* SPIN ANIMATION */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

#proof{
  margin-top:10px;
}

label.info{
  display:block;
  margin-top:20px; /* 🔥 FIX spacing */
}

/* ===== SPEED FLASH BACKGROUND ===== */
.speed-bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  overflow:hidden;
  z-index:0;
  pointer-events:none;
}

/* FLASH LINES */
.speed-bg span{
  position:absolute;
  height:2px;
  width:120px;
  background:linear-gradient(90deg, transparent, #6366f1, transparent);
  opacity:0.5;
  filter:blur(1px);
  animation:flashMove linear infinite;
}

/* RANDOM POSITIONS */
.speed-bg span:nth-child(1){
  top:20%;
  animation-duration:1.2s;
}
.speed-bg span:nth-child(2){
  top:40%;
  animation-duration:1s;
}
.speed-bg span:nth-child(3){
  top:60%;
  animation-duration:1.4s;
}
.speed-bg span:nth-child(4){
  top:75%;
  animation-duration:1.1s;
}
.speed-bg span:nth-child(5){
  top:30%;
  animation-duration:1.3s;
}

/* FAST LEFT → RIGHT FLASH */
@keyframes flashMove{
  0%{
    transform:translateX(-150px);
    opacity:0;
  }
  10%{
    opacity:0.8;
  }
  100%{
    transform:translateX(120vw);
    opacity:0;
  }
}

</style>
</head>

<body>
  <div class="speed-bg">
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  <span></span>
  </div>

<div class="top-header">

  <div class="header-left">
    <h1>Donation Delivery</h1>

    <div class="dots">
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>

  <div class="header-right">
    <button class="back-btn" onclick="window.location.href='/user-dashboard'">
      ← Back
    </button>
  </div>

</div>
<div class="page">
<div class="container">

<h2 id="title">Loading...</h2>

<p class="info" id="org"></p>
<p class="info" id="desc"></p>

<input id="qty" placeholder="Enter Quantity">

<div class="radio-group">
<label><input type="radio" name="method" value="Self" checked onclick="toggleMethod()"> Deliver Myself</label>
<label><input type="radio" name="method" value="Pickup" onclick="toggleMethod()"> Request Pickup</label>
</div>

<!-- PROOF UPLOAD -->
<label class="info">Upload Item Proof</label>
<input type="file" id="proof">

<button id="submitBtn" onclick="submitDonation()">Confirm Donation</button>
<div id="msg" class="success"></div>

</div>

<div class="side-container" id="sideBox"></div>

</div>

<div class="footer-text">
  Your small contribution creates a big impact ❤️  
  Together we build stronger communities.
</div>

<script>

const params = new URLSearchParams(window.location.search);
const requestId = params.get("request");

const token = localStorage.getItem("token");

let orgAddress = "";
let orgDetails = {};

async function loadData(){
if(!token){
window.location.href="/user-login";
return;
}

const res = await fetch("/request/"+requestId,{
headers:{ "Authorization": token }
});

const data = await res.json();

orgDetails = {
  address: data.location,
  name: data.org_name,
  email: data.email || "Not available",
  mobile: data.mobile || "Not available",
  contact: data.contact_person || "Not available"
};

const method = document.querySelector('input[name="method"]:checked').value;
renderSide(method);

document.getElementById("title").innerText = data.title;
document.getElementById("org").innerText = "Organization: " + data.org_name;
document.getElementById("desc").innerText =
"Items Needed: " + (data.items_description || "Not specified");

// store org address
orgAddress = data.location;
}

function renderSide(method){

const side = document.getElementById("sideBox");
if(method === "Self"){

side.innerHTML = `
<h3>Delivery Details</h3>
<p><b>Organization:</b> ${orgDetails.name}</p>
<p><b>Address:</b> ${orgDetails.address}</p>
<p><b>Contact Person:</b> ${orgDetails.contact}</p>
<p><b>Email:</b> ${orgDetails.email}</p>
<p><b>Mobile:</b> ${orgDetails.mobile}</p>
`;

}
else{

side.innerHTML = `
<h3>Pickup Details</h3>

<input id="userName" placeholder="Your Name">
<input id="userMobile" placeholder="Mobile Number">
<input id="pickupAddress" placeholder="Your Address">
<input type="date" id="pickupDate">
`;

}
}

function toggleMethod(){

const method = document.querySelector('input[name="method"]:checked').value;
renderSide(method);

}

async function submitDonation(){

const btn = document.getElementById("submitBtn");

/* 🔥 START LOADING */
btn.classList.add("loading-btn");
btn.innerHTML = `<div class="spinner"></div>`;

const qty = document.getElementById("qty").value;
if(!qty){
  alert("Enter quantity");
  resetBtn();
  return;
}

const method = document.querySelector('input[name="method"]:checked').value;

let data = {
  request_id: requestId,
  quantity: qty,
  method: method
};

if(method === "Pickup"){

data.name = document.getElementById("userName").value;
data.mobile = document.getElementById("userMobile").value;
data.address = document.getElementById("pickupAddress").value;
data.date = document.getElementById("pickupDate").value;

if(!data.name || !data.mobile || !data.address || !data.date){
  alert("Fill all pickup details");
  resetBtn();
  return;
}

}

const file = document.getElementById("proof").files[0];

const formData = new FormData();

for(let key in data){
  formData.append(key, data[key]);
}

if(file){
  formData.append("proof", file);
}

try{

  const res = await fetch("/donate-items",{
    method:"POST",
    headers:{
      "Authorization": token
    },
    body: formData
  });

  const result = await res.json();

  document.getElementById("msg").innerText = result.msg;

  setTimeout(()=>{
    window.location.href="/user-dashboard";
  },2000);

}catch(err){
  alert("Something went wrong");
  resetBtn();
}

resetBtn();
}

/* RESET BUTTON */
function resetBtn(){
  const btn = document.getElementById("submitBtn");
  btn.classList.remove("loading-btn");
  btn.innerText = "Confirm Donation";
}

loadData();

// STOP SPEED ANIMATION AFTER 5 SECONDS
setTimeout(() => {
  const speedBg = document.querySelector(".speed-bg");
  if(speedBg){
    speedBg.style.opacity = "0"; // smooth fade
    speedBg.style.transition = "opacity 0.8s ease";
    
    // optional: completely remove after fade
    setTimeout(() => {
      speedBg.remove();
    }, 800);
  }
}, 900);

</script>

</body>
</html>
