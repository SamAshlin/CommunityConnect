<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Donate Items</title>

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#e2e8f0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* ===== MAIN CARD ===== */
.container{
  width:420px;
  padding:30px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 20px 50px rgba(0,0,0,0.5);
  animation:fadeUp 0.5s ease;
}

/* ===== TITLE ===== */
h2{
  margin-top:0;
  font-size:22px;
  font-weight: 600;
  background: linear-gradient(90deg, #a78bfa, #60a5fa);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* ===== INFO TEXT ===== */
.info{
  color:#94a3b8;
  font-size:14px;
  margin:8px 0;
}

/* ===== INPUTS ===== */
input, select{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:10px;
  border:none;
  background:rgba(255,255,255,0.05);
  color:white;
}

input::placeholder{
  color:#94a3b8;
}

/* ===== RADIO ===== */
.radio-group{
  margin-top:15px;
}

.radio-group label{
  display:block;
  margin:6px 0;
  cursor:pointer;
}

/* ===== BUTTON ===== */
button{
  width:100%;
  padding:14px;
  margin-top:18px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(99,102,241,0.4);
}

/* ===== SUCCESS ===== */
.success{
  color:#22c55e;
  margin-top:15px;
  font-weight:500;
}

/* ===== HIDDEN ===== */
.hidden{
  display:none;
}

/* ===== ADDRESS BOX ===== */
#orgAddressBox{
  margin-top:10px;
  padding:10px;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  color:#cbd5e1;
}

/* ===== ANIMATION ===== */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* LOADING BUTTON */
.loading-btn {
  position: relative;
  pointer-events: none;
  opacity: 0.8;
}

/* SPINNER */
.spinner {
  width: 18px;
  height: 18px;
  border: 3px solid rgba(255,255,255,0.3);
  border-top: 3px solid white;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: auto;
}

/* SPIN ANIMATION */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

</style>
</head>

<body>

<div class="container">

<h2 id="title">Loading...</h2>

<p class="info" id="org"></p>
<p class="info" id="desc"></p>

<input id="qty" placeholder="Enter Quantity">

<div class="radio-group">
<label><input type="radio" name="method" value="Self" checked onclick="toggleMethod()"> Deliver Myself</label>
<label><input type="radio" name="method" value="Pickup" onclick="toggleMethod()"> Request Pickup</label>
</div>

<!-- ORG ADDRESS -->
<div id="orgAddressBox" class="info"></div>

<!-- PICKUP SECTION -->
<div id="pickupBox" class="hidden">

<input id="pickupAddress" placeholder="Enter Your Address">

<input type="date" id="pickupDate">

<input type="time" id="pickupTime">

</div>

<!-- PROOF UPLOAD -->
<input type="file" id="proof">

<button id="submitBtn" onclick="submitDonation()">Confirm Donation</button>

<div id="msg" class="success"></div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const requestId = params.get("request");

const token = localStorage.getItem("token");

let orgAddress = "";

async function loadData(){

if(!token){
window.location.href="/user-login";
return;
}

const res = await fetch("/request/"+requestId,{
headers:{ "Authorization": token }
});

const data = await res.json();

document.getElementById("title").innerText = data.title;
document.getElementById("org").innerText = "Organization: " + data.org_name;
document.getElementById("desc").innerText = data.description;

// store org address
orgAddress = data.location;

// show default
document.getElementById("orgAddressBox").innerText =
"Deliver to: " + orgAddress;

}

function toggleMethod(){

const method = document.querySelector('input[name="method"]:checked').value;

if(method === "Self"){

document.getElementById("pickupBox").classList.add("hidden");

document.getElementById("orgAddressBox").innerText =
"Deliver to: " + orgAddress;

}
else{

document.getElementById("pickupBox").classList.remove("hidden");

document.getElementById("orgAddressBox").innerText = "";

}

}

async function submitDonation(){

const btn = document.getElementById("submitBtn");

/* 🔥 START LOADING */
btn.classList.add("loading-btn");
btn.innerHTML = `<div class="spinner"></div>`;

const qty = document.getElementById("qty").value;
if(!qty){
  alert("Enter quantity");
  resetBtn();
  return;
}

const method = document.querySelector('input[name="method"]:checked').value;

let data = {
  request_id: requestId,
  quantity: qty,
  method: method
};

if(method === "Pickup"){

  data.address = document.getElementById("pickupAddress").value;
  data.date = document.getElementById("pickupDate").value;
  data.time = document.getElementById("pickupTime").value;

  if(!data.address || !data.date || !data.time){
    alert("Fill pickup details");
    resetBtn();
    return;
  }
}

const file = document.getElementById("proof").files[0];

const formData = new FormData();

for(let key in data){
  formData.append(key, data[key]);
}

if(file){
  formData.append("proof", file);
}

try{

  const res = await fetch("/donate-items",{
    method:"POST",
    headers:{
      "Authorization": token
    },
    body: formData
  });

  const result = await res.json();

  document.getElementById("msg").innerText = result.msg;

  setTimeout(()=>{
    window.location.href="/user-dashboard";
  },2000);

}catch(err){
  alert("Something went wrong");
  resetBtn();
}

/* RESET BUTTON */
function resetBtn(){
  btn.classList.remove("loading-btn");
  btn.innerText = "Confirm Donation";
}

}

loadData();

</script>

</body>
</html>
