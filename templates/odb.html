<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<title>Organization Dashboard</title>

<style>

/* LIGHTER DARK THEME */
body{
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle,#111827,#020617);
  color:#e5e7eb;
  overflow:hidden;
}

.header-bar{
  height:70px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(17,24,39,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.05);
  position:relative;
  z-index:100;
}

/* LAYOUT */
.app{
  display:flex;
  height:100vh;
}

.sidebar{
  width:240px;
  height:100vh;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(20px);
  display:flex;
  flex-direction:column;
  padding:15px;
  box-sizing:border-box;
}

.right-section{
  flex:1;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.logo{text-align:center;
  font-size:20px;
  font-weight:600;
  color:#a5b4fc;

  margin-bottom:30px;}

.side-btn{
  display:block;
  width:100%;
  padding:12px;
  margin-bottom:10px;
  background:none;
  border:none;
  color:#cbd5e1;
  text-align:left;
  border-radius:10px;
}

.side-btn:hover,
.side-btn.active-tab{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}

.logout-btn{
  margin-top:auto; 
  margin-bottom:10px; 
  background:rgba(239,68,68,0.2);
  color:#ef4444;
  padding:10px;
  border-radius:8px;
  background:rgba(239,68,68,0.2);
  color:#ef4444;
  position:sticky;
  bottom:10px;   
}

/* MAIN */
.main{
  flex:1;
  padding:25px 30px;
  overflow:auto;
  margin:0;
  overflow-y:auto;
  height:100vh;
  scrollbar-width: none; 
}

.main::-webkit-scrollbar{
  display:none; /* Chrome */
}

.topbar h1{font-size:28px;margin-bottom:20px;}

/* STATS */
.stats-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
}

.stat-card{
  background:rgba(255,255,255,0.08);
  padding:20px;
  border-radius:15px;
  backdrop-filter:blur(10px);
}

.stat-card p{
  font-size:22px;
  font-weight:bold;
  margin-top:10px;
}

/* CARD */
.card{
  margin-top:20px;
  padding:20px;
  border-radius:15px;
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);
}

/* FORM */
.form-box.modern{
  background:rgba(255,255,255,0.06);
  padding:25px;
  border-radius:15px;
}

input,select,textarea{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  background:rgba(255,255,255,0.05);
  color:white;
}

/* BUTTON */
button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}

/* GRAPH BARS */
.bar{
  height:10px;
  background:#1f2937;
  border-radius:10px;
  margin:10px 0;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#6366f1,#0ea5e9);
  animation:grow 1s ease;
}

.org-name{
  position:absolute;
  left:50%;
  transform:translateX(-50%);

  font-size:22px;   /* 🔥 bigger */
  font-weight:700;
  color:#c7d2fe;

  letter-spacing:0.5px;
}

.header-right{
  margin-left:auto;
}

@keyframes grow{
  from{width:0;}
}

.panel {
  display: none;
  animation: fadeIn 0.3s ease;
}

.panel.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.profile-btn{
  position:absolute;
  right:20px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  box-shadow:0 4px 12px rgba(99,102,241,0.3);
}

.profile-btn:hover{
  transform:scale(1.05);
}

select{
  appearance:none;
  background:rgba(255,255,255,0.08);
  color:white;
}

select option{
  background:#111827;   /* dark background */
  color:#e5e7eb;        /* visible text */
}

select:focus{
  outline:none;
  border:1px solid #6366f1;
}
</style>
</head>

<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
  <h2 class="logo">🏢 ORG Panel</h2>
  <div class="menu">

    <button class="side-btn active-tab" onclick="showPanel('home', this)">🏠 Home</button>

    <button class="side-btn" onclick="showPanel('create', this)">➕ Create Request</button>

    <button class="side-btn" onclick="showPanel('requests', this)">📋 My Requests</button>

    <button class="side-btn" onclick="showPanel('itemDonations', this); loadItemDonations();">📦 Item Donations</button>

  </div>

  <button class="side-btn logout-btn" onclick="logout()">🚪 Logout</button>

  </aside>

  <div class="right-section">

  <div class="header-bar">
    <div class="org-name" id="orgNameTop">
    Organization
    </div>

    <button class="profile-btn" onclick="showPanel('profile')">👤</button>

  </div>

  <!-- MAIN -->
  <main class="main">

    <div class="topbar">
      <h1 id="pageTitle">Dashboard</h1>
    </div>

    <!-- HOME PANEL -->
    <div id="home" class="panel active">

      <div class="stats-grid">
        <div class="stat-card">
          <h3>Total Donations</h3>
          <p id="totalDonations">₹0</p>
        </div>

        <div class="stat-card">
          <h3>Total Requests</h3>
          <p id="totalRequests">0</p>
        </div>

        <div class="stat-card">
          <h3>Items Collected</h3>
          <p id="totalItems">0</p>
        </div>
      </div>

      <!-- GRAPH -->
      <div class="card">
        <h3>Donation Progress</h3>
        <div id="graphContainer"></div>
      </div>

      <!-- LAST REQUEST -->
      <div class="card">
        <h3>Last Created Request</h3>
        <div id="lastRequest"></div>
      </div>

      <!-- RECENT DONATIONS -->
      <div class="card">
        <h3>Recent Donations</h3>
        <div id="recentDonations"></div>
      </div>

    </div>

    <!-- CREATE -->
    <div id="create" class="panel">
      <div class="form-box modern">
        <h3>Create Request</h3>

        <input id="title" placeholder="Title">
        <textarea id="description"></textarea>

        <select id="category">
          <option value="">Category</option>
          <option>Education</option>
          <option>Healthcare</option>
          <option>Food</option>
          <option>Clothing</option>
        </select>

        <select id="type" onchange="checkType()">
          <option value="">Type</option>
          <option value="Money">Money</option>
          <option value="Items">Items</option>
        </select>

        <div id="moneyBox" style="display:none;">
          <input id="amount" placeholder="Amount ₹">
        </div>

        <div id="itemsBox" style="display:none;">
          <input id="items_description" placeholder="Items">
          <input id="quantity" placeholder="Quantity">
          <input id="equivalent_amount" placeholder="Equivalent ₹">
        </div>

        <input id="location" placeholder="Location">

        <button onclick="createRequest()">Submit</button>
      </div>
    </div>

    <div id="requests" class="panel"></div>
    <div id="itemDonations" class="panel"></div>

    <!-- PROFILE -->
    <div id="profile" class="panel">
      <div class="card">
      <h3>🏢 Organization Profile</h3>

      <p><b>Name:</b> <span id="orgName"></span></p>
      <p><b>Email:</b> <span id="orgEmail"></span></p>
      <p><b>Type:</b> <span id="orgType"></span></p>
      </div>
    </div>

    <div id="donations" class="panel">
    <h3>Donations</h3>
    <div id="donationList"></div>
    </div>

  </main>
</div>

</div>

<script>

async function loadHome(){
  const token = localStorage.getItem("token");

  const res = await fetch("/my-requests",{
    headers:{ "Authorization": token }
  });

  const data = await res.json();

  let total = 0, items = 0;

  document.getElementById("totalRequests").innerText = data.length;

  const graph = document.getElementById("graphContainer");
  const last = document.getElementById("lastRequest");

  graph.innerHTML = "";
  last.innerHTML = "";

  if(data.length > 0){

    const latest = data[data.length-1];

    last.innerHTML = `<b>${latest.title}</b><p>${latest.description}</p>`;
  }

  data.slice(0,5).forEach(req=>{

    let percent = 0;

    if(req.type === "Money"){
      percent = req.amount ? (req.received_amount/req.amount)*100 : 0;
      total += req.received_amount || 0;
    }else{
      percent = req.equivalent_amount ? (req.received_money/req.equivalent_amount)*100 : 0;
      items += req.received_quantity || 0;
    }

    graph.innerHTML += `
      <div>${req.title}</div>
      <div class="bar">
        <div class="fill" style="width:${percent}%"></div>
      </div>
    `;
  });

  document.getElementById("totalDonations").innerText = "₹"+total;
  document.getElementById("totalItems").innerText = items;
}

loadHome();

/* PANEL SWITCH */
function showPanel(id, btn){
  document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".side-btn").forEach(b=>b.classList.remove("active-tab"));

  if(btn) btn.classList.add("active-tab");

  document.getElementById(id).classList.add("active");

  const titles={
    home:"Dashboard",
    create:"Create Request",
    requests:"My Requests",
    itemDonations:"Item Donations",
    profile:"Profile",
    donations:"Donations"
  };

  document.getElementById("pageTitle").innerText = titles[id];

  if(id==="requests") loadRequests();
  if(id==="itemDonations") loadItemDonations();
  if(id==="home") loadHome();
  if(id==="profile") loadProfile();
}

async function loadOrgName(){

  const token = localStorage.getItem("token");

  const res = await fetch("/my-requests",{
    headers:{ "Authorization": token }
  });

  const data = await res.json();

  if(data.length > 0){
    document.getElementById("orgNameTop").innerText =
      data[0].org_name || "Organization";
  }else{
    document.getElementById("orgNameTop").innerText = "Organization";
  }
}

loadOrgName();

/* CREATE REQUEST */
async function createRequest(){
const token = localStorage.getItem("token");
const type = document.getElementById("type").value;

const payload = {
title: document.getElementById("title").value,
description: document.getElementById("description").value,
category: document.getElementById("category").value,
type: document.getElementById("type").value,
location: document.getElementById("location").value
};

if(type === "Money"){
payload.amount = document.getElementById("amount").value;
}

if(type === "Items"){
payload.items_description = items_description.value;
payload.quantity = quantity.value;
payload.equivalent_amount = equivalent_amount.value;
}

const res = await fetch("/create-request",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization": token
},
body: JSON.stringify(payload)
});

const result = await res.json();
alert(result.msg);
}

/* LOAD MY REQUESTS */
async function loadRequests(){

const token = localStorage.getItem("token");
const res = await fetch("/my-requests",{
headers:{"Authorization": token}
});

const data = await res.json();
const container = document.getElementById("requests");
container.innerHTML="";

data.forEach(req=>{

let displayHTML = "";

if(req.type === "Money"){

let received = req.received_amount || 0;
let total = req.amount || 0;

let percent = total > 0 ? (received/total)*100 : 0;

displayHTML = `
<div class="bar">
<div class="fill" style="width:${percent}%"></div>
</div>

<p>${Math.floor(percent)}% funded</p>
<p>₹${received} / ₹${total}</p>
`;
}

else{

const qtyPercent = req.quantity ? (req.received_quantity / req.quantity) * 100 : 0;
const moneyPercent = req.equivalent_amount ? (req.received_money / req.equivalent_amount) * 100 : 0;

displayHTML = `
<div class="progress-label">Items Progress</div>
<div class="bar">
<div class="fill" style="width:${qtyPercent}%"></div>
</div>

<div class="progress-label">Amount Progress</div>
<div class="bar">
<div class="fill" style="width:${moneyPercent}%"></div>
</div>

<p>${Math.floor(moneyPercent)}% funded</p>

<p>
Items: ${req.items_description || "N/A"}<br>
Qty: ${req.received_quantity || 0} / ${req.quantity || 0}<br>
₹${req.received_money || 0} / ₹${req.equivalent_amount || 0}
</p>
`;
}

container.innerHTML += `
<div class="card">

<h3>${req.title}</h3>
<p>${req.description}</p>

${displayHTML}

<button onclick="viewDonations('${req._id}')">
View Donations
</button>

</div>
`;

});

}

/* VIEW DONATIONS */
async function viewDonations(id){

showPanel("donations");

const token = localStorage.getItem("token");

const res = await fetch("/donations/"+id,{
headers:{"Authorization": token}
});

const data = await res.json();

const list = document.getElementById("donationList");

list.innerHTML="";

if(!data || data.length === 0){
list.innerHTML += "<p>No donations yet 💰</p>";
return;
}

data.forEach(d=>{
let text = "";
if(d.amount && d.amount > 0){
text = `₹${d.amount}`;
}
else if(d.quantity){
text = `${d.quantity} items (${d.status})`;
}
else{
text = "Unknown donation";
}

list.innerHTML += `
<div class="donation-item">
${d.name || "Anonymous"} → ${text}
</div>
`;
});
}


async function loadItemDonations(){
const token = localStorage.getItem("token");
const res = await fetch("/org-item-donations",{
headers:{ "Authorization": token }
});

const data = await res.json();

const container = document.getElementById("itemDonations");

container.innerHTML = "<h2>Incoming Item Donations</h2>";

data.forEach(d=>{

container.innerHTML += `
<div class="card">

<h3>${d.request_title}</h3>

<p><b>Donor:</b> ${d.donor_name}</p>

<p><b>Quantity:</b> ${d.quantity}</p>

<p><b>Method:</b> ${d.method}</p>

<p><b>Status:</b> ${d.status}</p>

${d.method === "Pickup" ? `
<p><b>Pickup Address:</b> ${d.address}</p>
<p><b>Date:</b> ${d.date}</p>
<p><b>Time:</b> ${d.time}</p>
` : ""}

${d.proof ? `<img src="/${d.proof}" width="150">` : ""}

<div>

<button onclick="updateStatus('${d._id}','Approved')">Accept</button>

<button onclick="updateStatus('${d._id}','Rejected')">Reject</button>

<button onclick="updateStatus('${d._id}','Completed')">Mark Completed</button>

</div>

</div>
`;

});

}

async function updateStatus(id, status){

const token = localStorage.getItem("token");

await fetch("/update-item-status",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization": token
},
body: JSON.stringify({
donation_id: id,
status: status
})
});

alert("Updated");

loadItemDonations();

}

async function loadProfile(){

  const token = localStorage.getItem("token");

  const res = await fetch("/org-profile",{
    headers:{ "Authorization": token }
  });

  const data = await res.json();

  document.getElementById("orgName").innerText = "🏢 " + data.name;
  document.getElementById("orgEmail").innerText = "📧 " + data.email;
  document.getElementById("orgType").innerText = "🏷️ " + data.type;
}

/* TYPE SWITCH */
function checkType(){
const type = document.getElementById("type").value;
document.getElementById("moneyBox").style.display = "none";
document.getElementById("itemsBox").style.display = "none";

if(type === "Money"){
document.getElementById("moneyBox").style.display = "block";
}
else if(type === "Items"){
document.getElementById("itemsBox").style.display = "block";
}
}

/* LOGOUT */
function logout(){
localStorage.clear();
window.location.href="/org-login";
}

document.addEventListener("DOMContentLoaded", () => {
  showPanel("home", document.querySelector(".side-btn"));
});

</script>

</body>
</html>
